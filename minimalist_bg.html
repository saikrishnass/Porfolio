<style>
        /* Custom Styles for Cinematic Feel */
        body {

        .glass-panel {
            background: rgba(18, 18, 18, 0.6);

        }

        /* Snap Scroll Container */
        .snap-container {
            height: 100vh;
            overflow-y: scroll;
            scroll-snap-type: y mandatory;
            scroll-behavior: smooth;
        }

        .snap-section {
            scroll-snap-align: start;
            height: 100vh;
            width: 100%;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* Reveal Animations */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(40px) scale(0.98);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .reveal-element {
            opacity: 0;
            transform: translateY(40px) scale(0.98);
            transition: all 1.2s cubic-bezier(0.19, 1, 0.22, 1);
        }

        .reveal-element.active {
            animation: fadeInUp 1s cubic-bezier(0.19, 1, 0.22, 1) forwards;
        }

        .delay-100 { animation-delay: 100ms; }
        .delay-200 { animation-delay: 200ms; }
        .delay-300 { animation-delay: 300ms; }

        /* Scroll Pulse */
        @keyframes pulse-scroll {
            0% { transform: scaleY(1); opacity: 0.5; }
            50% { transform: scaleY(1.5); opacity: 1; }
            100% { transform: scaleY(1); opacity: 0.5; }
        }
        .scroll-line {
            animation: pulse-scroll 2s infinite ease-in-out;
            transform-origin: top;
        }

        /* Button Magnetic Effect */
        .magnetic-btn {
            display: inline-block;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);

<!-- Particle Network Canvas Background -->
<canvas class="fixed inset-0 pointer-events-none z-0 opacity-100" height="1024" id="particle-network" width="1280"></canvas>
<!-- Interactions & Animations -->
<script>
        document.addEventListener('DOMContentLoaded', () => {
            // Particle Network Logic
            const canvas = document.getElementById('particle-network');
            const ctx = canvas.getContext('2d');
            let width, height;
            let particles = [];
            const mouse = { x: null, y: null, radius: 150 };

            function resize() {
                width = canvas.width = window.innerWidth;
                height = canvas.height = window.innerHeight;
            }
            window.addEventListener('resize', resize);
            resize();

            class Particle {
                constructor() {
                    this.x = Math.random() * width;
                    this.y = Math.random() * height;
                    this.vx = (Math.random() - 0.5) * 1.5;
                    this.vy = (Math.random() - 0.5) * 1.5;
                    this.radius = Math.random() * 2.0 + 1.0;
                }
                update() {
                    this.x += this.vx;
                    this.y += this.vy;

                    if (this.x < 0 || this.x > width) this.vx = -this.vx;
                    if (this.y < 0 || this.y > height) this.vy = -this.vy;

                    if (mouse.x != null && mouse.y != null) {
                        let dx = mouse.x - this.x;
                        let dy = mouse.y - this.y;
                        let distance = Math.sqrt(dx * dx + dy * dy);
                        if (distance < mouse.radius) {
                            const forceDirectionX = dx / distance;
                            const forceDirectionY = dy / distance;
                            const force = (mouse.radius - distance) / mouse.radius;
                            const pushX = forceDirectionX * force * 1.5;
                            const pushY = forceDirectionY * force * 1.5;
                            this.x -= pushX;
                            this.y -= pushY;
                        }
                    }
                }
                draw() {
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                    ctx.fillStyle = 'rgba(20, 40, 160, 0.9)'; // electric-blue with high opacity
                    ctx.fill();
                }
            }

            function initParticles() {
                particles = [];
                const numberOfParticles = Math.floor((width * height) / 12000);
                for (let i = 0; i < numberOfParticles; i++) {
                    particles.push(new Particle());
                }
            }
            initParticles();

            function animateParticles() {
                ctx.clearRect(0, 0, width, height);
                
                for (let i = 0; i < particles.length; i++) {
                    particles[i].update();
                    particles[i].draw();
                    
                    for (let j = i; j < particles.length; j++) {
                        let dx = particles[i].x - particles[j].x;
                        let dy = particles[i].y - particles[j].y;
                        let distance = Math.sqrt(dx * dx + dy * dy);
                        
                        if (distance < 120) {
                            ctx.beginPath();
                            ctx.strokeStyle = `rgba(20, 40, 160, ${0.7 - distance/170})`; // electric-blue connection
                            ctx.lineWidth = 1;
                            ctx.moveTo(particles[i].x, particles[i].y);
                            ctx.lineTo(particles[j].x, particles[j].y);
                            ctx.stroke();
                        }
                    }
                    
                    if (mouse.x != null && mouse.y != null) {
                        let dx = particles[i].x - mouse.x;
                        let dy = particles[i].y - mouse.y;
                        let distance = Math.sqrt(dx * dx + dy * dy);
                        if (distance < 180) {
                            ctx.beginPath();
                            ctx.strokeStyle = `rgba(188, 195, 255, ${0.8 - distance/225})`; // magnetic line
                            ctx.lineWidth = 1.5;
                            ctx.moveTo(particles[i].x, particles[i].y);
                            ctx.lineTo(mouse.x, mouse.y);
                            ctx.stroke();
                        }
                    }
                }
                requestAnimationFrame(animateParticles);
            }
            animateParticles();

            window.addEventListener('mousemove', (e) => {
                mouse.x = e.x;
                mouse.y = e.y;
            });
            window.addEventListener('mouseout', () => {
                mouse.x = null;
                mouse.y = null;
            });
        });
    </script>
